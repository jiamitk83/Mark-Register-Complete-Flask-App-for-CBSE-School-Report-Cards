{% extends "base.html" %}

{% block title %}Edit Student - School Report Card{% endblock %}

{% block content %}
<div class="fade-in">
    <div class="page-header">
        <h1><i class="fas fa-user-edit me-3"></i>Edit Student</h1>
        <p class="mb-0">Update {{ student.name or 'student' }} details</p>
    </div>

    <div class="card">
        <div class="card-body">
            <form method="POST" novalidate>
                <input type="hidden" name="admission_no" value="{{ student.admission_no }}">
                
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="name" class="form-label">Full Name <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="name" name="name" value="{{ student.name or '' }}" required maxlength="100">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="class_name" class="form-label">Class <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="class_name" name="class_name" value="{{ student.class_name or '' }}" required maxlength="10">
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-4 mb-3">
                        <label for="section" class="form-label">Section <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="section" name="section" value="{{ student.section or '' }}" required maxlength="2">
                    </div>
                    <div class="col-md-4 mb-3">
                        <label for="roll_no" class="form-label">Roll No</label>
                        <input type="number" class="form-control" id="roll_no" name="roll_no" value="{{ student.roll_no or '' }}" min="1" max="100">
                    </div>
                    <div class="col-md-4 mb-3">
                        <label for="admission_no_disp" class="form-label">Admission No</label>
                        <input type="text" class="form-control" id="admission_no_disp" value="{{ student.admission_no }}" readonly>
                        <small class="text-muted">Cannot be changed</small>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="father_name" class="form-label">Father's Name</label>
                        <input type="text" class="form-control" id="father_name" name="father_name" value="{{ student.father_name or '' }}" maxlength="100">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="mother_name" class="form-label">Mother's Name</label>
                        <input type="text" class="form-control" id="mother_name" name="mother_name" value="{{ student.mother_name or '' }}" maxlength="100">
                    </div>
                </div>

                <div class="mb-4">
                    <label for="dob" class="form-label">Date of Birth</label>
                    <input type="date" class="form-control" id="dob" name="dob" value="{{ student.dob or '' }}" min="1900-01-01" max="{{ today }}">
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-success">
                        <i class="fas fa-save me-2"></i>Update Student
                    </button>
                    <a href="{{ url_for('students') }}" class="btn btn-secondary">
                        <i class="fas fa-arrow-left me-2"></i>Cancel
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
