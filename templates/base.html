<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}School Mark Register{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4F46E5;
            --primary-dark: #4338CA;
            --primary-light: #818CF8;
            --secondary: #64748B;
            --success: #10B981;
            --warning: #F59E0B;
            --danger: #EF4444;
            --info: #06B6D4;
            --dark: #1E293B;
            --light: #F8FAFC;
            --white: #FFFFFF;
            --gray-100: #F1F5F9;
            --gray-200: #E2E8F0;
            --gray-300: #CBD5E1;
            --gray-400: #94A3B8;
            --gray-500: #64748B;
            --gray-600: #475569;
            --gray-700: #334155;
            --gray-800: #1E293B;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1), 0 1px 2px -1px rgb(0 0 0 / 0.1);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
            --radius-sm: 0.375rem;
            --radius: 0.5rem;
            --radius-lg: 0.75rem;
            --radius-xl: 1rem;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            background-attachment: fixed;
        }
        
        .sidebar {
            position: fixed;
            top: 0;
            left: 0;
            height: 100vh;
            width: 260px;
            background: linear-gradient(180deg, #1E293B 0%, #0F172A 100%);
            padding: 1.5rem 1rem;
            z-index: 1000;
            overflow-y: auto;
            box-shadow: 4px 0 20px rgba(0, 0, 0, 0.15);
        }
        
        .sidebar-brand {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem 1rem;
            margin-bottom: 2rem;
            text-decoration: none;
        }
        
        .sidebar-brand-icon {
            width: 42px;
            height: 42px;
            background: linear-gradient(135deg, #4F46E5, #7C3AED);
            border-radius: var(--radius);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.25rem;
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.4);
        }
        
        .sidebar-brand-text {
            color: white;
            font-size: 1.25rem;
            font-weight: 700;
            letter-spacing: -0.025em;
        }
        
        .sidebar-menu {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        
        .sidebar-menu-item {
            margin-bottom: 0.375rem;
        }
        
        .sidebar-menu-link {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem 1rem;
            color: #94A3B8;
            text-decoration: none;
            border-radius: var(--radius);
            font-weight: 500;
            transition: all 0.2s ease;
        }
        
        .sidebar-menu-link:hover {
            background: rgba(79, 70, 229, 0.1);
            color: #A5B4FC;
        }
        
        .sidebar-menu-link.active {
            background: linear-gradient(135deg, #4F46E5, #7C3AED);
            color: white;
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.4);
        }
        
        .sidebar-menu-link i {
            width: 20px;
            text-align: center;
        }
        
        .main-content {
            margin-left: 260px;
            padding: 2rem;
            min-height: 100vh;
        }
        
        .page-header {
            margin-bottom: 2rem;
        }
        
        .page-title {
            font-size: 1.875rem;
            font-weight: 700;
            color: white;
            margin-bottom: 0.5rem;
            letter-spacing: -0.025em;
        }
        
        .page-subtitle {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.9375rem;
        }
        
        .card {
            background: white;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            border: none;
            overflow: hidden;
        }
        
        .card-header {
            background: white;
            border-bottom: 1px solid var(--gray-200);
            padding: 1.25rem 1.5rem;
            font-weight: 600;
            color: var(--dark);
        }
        
        .card-body {
            padding: 1.5rem;
        }
        
        .stats-card {
            background: white;
            border-radius: var(--radius-lg);
            padding: 1.5rem;
            box-shadow: var(--shadow-lg);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        
        .stats-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.15);
        }
        
        .stats-icon {
            width: 48px;
            height: 48px;
            border-radius: var(--radius);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
            margin-bottom: 1rem;
        }
        
        .stats-icon.primary {
            background: rgba(79, 70, 229, 0.1);
            color: #4F46E5;
        }
        
        .stats-icon.success {
            background: rgba(16, 185, 129, 0.1);
            color: #10B981;
        }
        
        .stats-icon.warning {
            background: rgba(245, 158, 11, 0.1);
            color: #F59E0B;
        }
        
        .stats-icon.info {
            background: rgba(6, 182, 212, 0.1);
            color: #06B6D4;
        }
        
        .stats-value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--dark);
            line-height: 1;
            margin-bottom: 0.25rem;
        }
        
        .stats-label {
            font-size: 0.875rem;
            color: var(--gray-500);
            font-weight: 500;
        }
        
        .btn {
            font-weight: 500;
            padding: 0.625rem 1.25rem;
            border-radius: var(--radius);
            transition: all 0.2s ease;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #4F46E5, #7C3AED);
            border: none;
            box-shadow: 0 2px 8px rgba(79, 70, 229, 0.3);
        }
        
        .btn-primary:hover {
            background: linear-gradient(135deg, #4338CA, #6D28D9);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.4);
        }
        
        .btn-success {
            background: linear-gradient(135deg, #10B981, #059669);
            border: none;
            box-shadow: 0 2px 8px rgba(16, 185, 129, 0.3);
        }
        
        .btn-success:hover {
            background: linear-gradient(135deg, #059669, #047857);
        }
        
        .btn-danger {
            background: linear-gradient(135deg, #EF4444, #DC2626);
            border: none;
        }
        
        .btn-danger:hover {
            background: linear-gradient(135deg, #DC2626, #B91C1C);
        }
        
        .btn-outline-primary {
            color: #4F46E5;
            border-color: #4F46E5;
        }
        
        .btn-outline-primary:hover {
            background: #4F46E5;
            border-color: #4F46E5;
        }
        
        .form-control, .form-select {
            border-radius: var(--radius);
            border: 2px solid var(--gray-200);
            padding: 0.625rem 0.875rem;
            font-weight: 500;
            transition: all 0.2s ease;
        }
        
        .form-control:focus, .form-select:focus {
            border-color: #4F46E5;
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }
        
        .table {
            margin-bottom: 0;
        }
        
        .table thead th {
            background: var(--gray-50);
            border-bottom: 2px solid var(--gray-200);
            color: var(--gray-700);
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 0.05em;
            padding: 1rem;
        }
        
        .table tbody td {
            padding: 1rem;
            vertical-align: middle;
            border-bottom: 1px solid var(--gray-100);
        }
        
        .table tbody tr:hover {
            background: var(--gray-50);
        }
        
        .badge-grade {
            padding: 0.375rem 0.75rem;
            border-radius: var(--radius);
            font-weight: 600;
            font-size: 0.875rem;
        }
        
        .badge-grade-a-plus {
            background: linear-gradient(135deg, #10B981, #059669);
            color: white;
        }
        
        .badge-grade-a {
            background: linear-gradient(135deg, #22C55E, #16A34A);
            color: white;
        }
        
        .badge-grade-b-plus {
            background: linear-gradient(135deg, #3B82F6, #2563EB);
            color: white;
        }
        
        .badge-grade-b {
            background: linear-gradient(135deg, #06B6D4, #0891B2);
            color: white;
        }
        
        .badge-grade-c {
            background: linear-gradient(135deg, #F59E0B, #D97706);
            color: white;
        }
        
        .badge-grade-d {
            background: linear-gradient(135deg, #F97316, #EA580C);
            color: white;
        }
        
        .badge-grade-f {
            background: linear-gradient(135deg, #EF4444, #DC2626);
            color: white;
        }
        
        .modal-content {
            border-radius: var(--radius-lg);
            border: none;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
        }
        
        .modal-header {
            border-bottom: 1px solid var(--gray-200);
            padding: 1.25rem 1.5rem;
        }
        
        .modal-title {
            font-weight: 600;
            color: var(--dark);
        }
        
        .modal-body {
            padding: 1.5rem;
        }
        
        .modal-footer {
            border-top: 1px solid var(--gray-200);
            padding: 1rem 1.5rem;
        }
        
        .toast-container {
            position: fixed;
            top: 1rem;
            right: 1rem;
            z-index: 9999;
        }
        
        .toast {
            border-radius: var(--radius);
            box-shadow: var(--shadow-lg);
        }
        
        .empty-state {
            text-align: center;
            padding: 3rem;
            color: var(--gray-500);
        }
        
        .empty-state i {
            font-size: 3rem;
            margin-bottom: 1rem;
            opacity: 0.5;
        }
        
        .recent-student-card {
            background: var(--gray-50);
            border-radius: var(--radius);
            padding: 0.75rem 1rem;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.2s ease;
        }
        
        .recent-student-card:hover {
            background: var(--gray-100);
            transform: translateX(4px);
        }
        
        .recent-student-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, #4F46E5, #7C3AED);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 0.875rem;
        }
        
        .recent-student-info {
            flex: 1;
            margin-left: 0.75rem;
        }
        
.recent-student-name {
            font-weight: 600;
            color: var(--dark);
            font-size: 0.875rem;
            text-transform: uppercase;
        }
        
        .recent-student-class {
            font-size: 0.75rem;
            color: var(--gray-500);
        }
        
        .marks-input {
            width: 80px;
            text-align: center;
        }
        
        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
            }
            
            .main-content {
                margin-left: 0;
            }
        }
        
        .fade-in {
            animation: fadeIn 0.3s ease-out;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .loading-spinner {
            display: inline-block;
            width: 1rem;
            height: 1rem;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <!-- Sidebar -->
    <nav class="sidebar">
        <a href="/" class="sidebar-brand">
            <div class="sidebar-brand-icon">
                <i class="fas fa-graduation-cap"></i>
            </div>
            <span class="sidebar-brand-text">Mark Register</span>
        </a>
        
        <ul class="sidebar-menu">
            <li class="sidebar-menu-item">
                <a href="/" class="sidebar-menu-link {% if request.path == '/' %}active{% endif %}">
                    <i class="fas fa-home"></i>
                    <span>Dashboard</span>
                </a>
            </li>
            <li class="sidebar-menu-item">
                <a href="/students" class="sidebar-menu-link {% if request.path == '/students' %}active{% endif %}">
                    <i class="fas fa-users"></i>
                    <span>Students</span>
                </a>
            </li>
            <li class="sidebar-menu-item">
                <a href="/subjects" class="sidebar-menu-link {% if request.path == '/subjects' %}active{% endif %}">
                    <i class="fas fa-book"></i>
                    <span>Subjects</span>
                </a>
            </li>
            <li class="sidebar-menu-item">
                <a href="/marks" class="sidebar-menu-link {% if request.path == '/marks' %}active{% endif %}">
                    <i class="fas fa-pen"></i>
                    <span>Marks Entry</span>
                </a>
            </li>
            <li class="sidebar-menu-item">
                <a href="/results" class="sidebar-menu-link {% if request.path == '/results' %}active{% endif %}">
                    <i class="fas fa-chart-bar"></i>
                    <span>Results</span>
                </a>
            </li>
            <li class="sidebar-menu-item">
                <a href="/settings" class="sidebar-menu-link {% if request.path == '/settings' %}active{% endif %}">
                    <i class="fas fa-cog"></i>
                    <span>Settings</span>
                </a>
            </li>
        </ul>
    </nav>
    
    <!-- Main Content -->
    <main class="main-content">
        {% block content %}{% endblock %}
    </main>
    
    <!-- Toast Container -->
    <div class="toast-container">
        <div id="toast" class="toast" role="alert" aria-live="assertive" aria-atomic="true">
            <div class="toast-header">
                <strong class="me-auto" id="toast-title">Notification</strong>
                <button type="button" class="btn-close" data-bs-dismiss="toast"></button>
            </div>
            <div class="toast-body" id="toast-message"></div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <script>
        function showToast(title, message, type = 'success') {
            const toast = document.getElementById('toast');
            const toastTitle = document.getElementById('toast-title');
            const toastMessage = document.getElementById('toast-message');
            
            toastTitle.textContent = title;
            toastMessage.textContent = message;
            
            const toastHeader = toast.querySelector('.toast-header');
            if (type === 'success') {
                toastHeader.className = 'toast-header bg-success text-white';
            } else if (type === 'error') {
                toastHeader.className = 'toast-header bg-danger text-white';
            } else {
                toastHeader.className = 'toast-header bg-info text-white';
            }
            
            const bsToast = new bootstrap.Toast(toast);
            bsToast.show();
        }
        
        function formatGradeClass(grade) {
            const gradeMap = {
                'A+': 'badge-grade-a-plus',
                'A': 'badge-grade-a',
                'B+': 'badge-grade-b-plus',
                'B': 'badge-grade-b',
                'C': 'badge-grade-c',
                'D': 'badge-grade-d',
                'F': 'badge-grade-f'
            };
            return gradeMap[grade] || 'bg-secondary';
        }
        
        function getInitials(name) {
            return name.split(' ').map(n => n[0]).join('').toUpperCase().slice(0, 2);
        }
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
